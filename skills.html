    <style>
    /* ============================================
       SKILLS PAGE STYLES
       ============================================ */

    .app-container {
      width: 100%;
      height: 80vh; /* fallback; JS adjusts dynamically on load */
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .header-bar {
      padding: 24px 40px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 15;
    }

    .header-left {
      flex: 1;
    }

    .header-left h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.015em;
    }

    .header-left p {
      font-size: 13px;
      color: #888;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .view-toggle {
      display: flex;
      gap: 2px;
      background-color: rgba(255, 255, 255, 0.05);
      padding: 6px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .toggle-btn {
      padding: 8px 16px;
      background: transparent;
      border: none;
      color: #888;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
    }

    .toggle-btn:hover {
      color: #d0d0d0;
    }

    .toggle-btn.active {
      background-color: rgba(255, 255, 255, 0.1);
      color: #e8e8e8;
    }

    @media (max-width: 768px) {
      .view-toggle {
        display: none;
      }

      .header-bar {
        padding: 16px 20px;
      }

      .header-left h1 {
        font-size: 20px;
      }
    }

    .content-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    /* Grid View Styles */
    .grid-view {
      display: none;
      flex-direction: column;
      height: 100%;
      overflow-y: auto;
      padding: 40px;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .grid-view.active {
      display: flex;
    }

    .tag-wall {
      display: grid;
      gap: 48px;
    }

    .domain-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .domain-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
      transition: color 0.3s ease;
    }

    .domain-section.has-selection .domain-label {
      color: #666;
    }

    .skills-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
    }

    .skill-tag {
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.1);
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      background-color: rgba(255, 255, 255, 0.04);
      color: #d0d0d0;
    }

    .skill-tag:hover {
      background-color: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .skill-tag.selected {
      background-color: var(--domain-color);
      color: #0a0a0a;
      font-weight: 600;
      border-color: var(--domain-color);
    }

    .skill-tag.dimmed {
      opacity: 0.2;
      cursor: default;
    }

    .skill-tag.dimmed:hover {
      transform: none;
      background-color: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.1);
    }

    /* Force Graph View Styles */
    .graph-view {
      display: none;
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    .graph-view.active {
      display: block;
    }

    #graph {
      width: 100%;
      height: 100%;
      display: block;
    }

    .skill-node {
      cursor: pointer;
      transition: filter 0.2s ease;
    }

    .skill-node-circle {
      fill-opacity: 0.85;
      transition: r 0.3s ease;
    }

    .skill-node-label {
      font-size: 11px;
      font-weight: 500;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      fill: #e8e8e8;
      opacity: 0.8;
    }

    .skill-node:hover .skill-node-circle {
      filter: brightness(1.2);
    }

    .skill-node.selected .skill-node-circle {
      filter: brightness(1.4);
      stroke: white;
      stroke-width: 2;
    }

    .skill-node.dimmed .skill-node-circle {
      fill-opacity: 0.2;
    }

    .skill-node.dimmed .skill-node-label {
      opacity: 0.2;
    }

    .skill-link {
      stroke: white;
      stroke-opacity: 0.08;
      stroke-linecap: round;
      transition: stroke-opacity 0.2s ease;
    }

    .skill-link.highlighted {
      stroke-opacity: 0.3;
      stroke-width: 1.5;
    }

    /* Breathing animation */
    @keyframes breathe {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.02);
      }
    }

    .skill-node-circle {
      animation: breathe 3s ease-in-out infinite;
    }

    /* Detail Panel Styles */
    #detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 380px;
      height: 100%;
      background: rgba(15, 15, 15, 0.95);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      padding: 32px 24px;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 25;
      backdrop-filter: blur(8px);
    }

    #detail-panel.active {
      transform: translateX(0);
    }

    .panel-header {
      margin-bottom: 32px;
    }

    .panel-skill-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .panel-domain {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
    }

    .panel-section {
      margin-bottom: 28px;
    }

    .panel-section-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 12px;
    }

    .evidence-item {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 12px;
      line-height: 1.5;
    }

    .evidence-label {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .evidence-meta {
      color: #888;
      font-size: 11px;
    }

    .evidence-type-pill {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-left: 8px;
      vertical-align: middle;
    }

    .evidence-type-pill.certification {
      background: rgba(124, 173, 232, 0.15);
      color: #7CADE8;
      border: 1px solid rgba(124, 173, 232, 0.3);
    }

    .evidence-type-pill.prototype {
      background: rgba(124, 232, 163, 0.15);
      color: #7CE8A3;
      border: 1px solid rgba(124, 232, 163, 0.3);
    }

    .evidence-type-pill.project {
      background: rgba(232, 214, 124, 0.15);
      color: #E8D67C;
      border: 1px solid rgba(232, 214, 124, 0.3);
    }

    .evidence-item.clickable {
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .evidence-item.clickable:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .connected-skill {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 8px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .connected-skill:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.16);
    }

    .connected-skill-name {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .connected-skill-via {
      color: #888;
      font-size: 11px;
    }

    .panel-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 24px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }

    .panel-close:hover {
      color: #ddd;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 768px) {
      #detail-panel {
        width: 100%;
        height: auto;
        max-height: 60vh;
        bottom: 0;
        right: 0;
        top: auto;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px 12px 0 0;
        transform: translateY(100%);
      }

      #detail-panel.active {
        transform: translateY(0);
      }

      .grid-view {
        padding: 24px;
      }

      .tag-wall {
        gap: 32px;
      }
    }

    /* Cert Popover Modal */
    .cert-modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .cert-modal-overlay.active {
      display: flex;
    }

    .cert-modal {
      background: #1a1a1a;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      max-width: 560px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
    }

    .cert-modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: none;
      color: #888;
      font-size: 20px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .cert-modal-close:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #e8e8e8;
    }

    .cert-modal-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding-right: 32px;
    }

    .cert-modal-logo {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .cert-modal-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.015em;
      margin-bottom: 4px;
    }

    .cert-modal-issuer {
      font-size: 13px;
      color: #888;
    }

    .cert-modal-credential {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .cert-modal-credential a {
      color: #7CADE8;
      text-decoration: none;
    }

    .cert-modal-credential a:hover {
      text-decoration: underline;
    }

    .cert-modal-section {
      margin-bottom: 20px;
    }

    .cert-modal-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
    }

    .cert-modal-section-text {
      font-size: 13px;
      line-height: 1.6;
      color: #ccc;
    }

    .cert-modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cert-modal-tag {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      background: rgba(124, 173, 232, 0.1);
      color: #7CADE8;
      border: 1px solid rgba(124, 173, 232, 0.2);
    }

    .cert-modal-capstone {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 16px;
    }

    .cert-modal-capstone-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #E8D67C;
      margin-bottom: 8px;
    }

    .cert-modal-capstone-text {
      font-size: 13px;
      line-height: 1.6;
      color: #aaa;
    }

    @media (max-width: 768px) {
      .cert-modal {
        max-width: none;
        width: 95%;
        padding: 24px;
        max-height: 85vh;
      }
    }
    </style>

    // Build lookup maps
    const domainMap = {};
    SKILLS_DATA.domains.forEach(d => domainMap[d.id] = d);

    const skillMap = {};
    SKILLS_DATA.skills.forEach(s => skillMap[s.id] = s);

    const sourceMap = {};
    SKILLS_DATA.sources.forEach(s => sourceMap[s.id] = s);

    // Build skill-to-sources mapping
    const skillToSources = {};
    const sourceToSkills = {};
    SKILLS_DATA.links.forEach(link => {
      if (!skillToSources[link.skill]) skillToSources[link.skill] = [];
      skillToSources[link.skill].push(link.source);

      if (!sourceToSkills[link.source]) sourceToSkills[link.source] = [];
      sourceToSkills[link.source].push(link.skill);
    });

    // Build skill-to-skill connections (skills sharing sources)
    const skillConnections = {};
    SKILLS_DATA.skills.forEach(skill => {
      skillConnections[skill.id] = {};
    });

    Object.entries(sourceToSkills).forEach(([source, skills]) => {
      for (let i = 0; i < skills.length; i++) {
        for (let j = i + 1; j < skills.length; j++) {
          const s1 = skills[i];
          const s2 = skills[j];
          if (!skillConnections[s1][s2]) skillConnections[s1][s2] = [];
          skillConnections[s1][s2].push(source);
          if (!skillConnections[s2][s1]) skillConnections[s2][s1] = [];
          skillConnections[s2][s1].push(source);
        }
      }
    });

    // App state
    let currentView = 'grid';
    let selectedSkill = null;
    let graphInitialized = false;
    let graphSimulation = null;

    // ========================================
    // GRID VIEW INITIALIZATION
    // ========================================
    function initializeGridView() {
      const tagWall = document.getElementById('tag-wall');
      tagWall.innerHTML = '';

      SKILLS_DATA.domains.forEach(domain => {
        const section = document.createElement('div');
        section.className = 'domain-section';
        section.setAttribute('data-domain', domain.id);

        const label = document.createElement('div');
        label.className = 'domain-label';
        label.textContent = domain.label;

        const grid = document.createElement('div');
        grid.className = 'skills-grid';

        const domainSkills = SKILLS_DATA.skills.filter(s => s.domain === domain.id);
        domainSkills.forEach(skill => {
          const tag = document.createElement('button');
          tag.className = 'skill-tag';
          tag.setAttribute('data-skill-id', skill.id);
          tag.setAttribute('data-domain', domain.id);
          tag.style.setProperty('--domain-color', domain.color);
          tag.textContent = skill.label;

          tag.addEventListener('click', (e) => {
            e.stopPropagation();
            selectSkill(skill.id);
            showDetailPanel(skill);
          });

          grid.appendChild(tag);
        });

        section.appendChild(label);
        section.appendChild(grid);
        tagWall.appendChild(section);
      });
    }

    // ========================================
    // GRAPH VIEW INITIALIZATION (LAZY)
    // ========================================
    function initializeGraphView() {
      if (graphInitialized) {
        // Resume simulation briefly so it settles, and resize SVG in case window changed
        const contentArea = document.querySelector('.content-area');
        const rect = contentArea.getBoundingClientRect();
        d3.select('#graph')
          .attr('width', rect.width || window.innerWidth)
          .attr('height', rect.height || 700);
        if (graphSimulation) {
          graphSimulation.force('center', d3.forceCenter((rect.width || window.innerWidth) / 2, (rect.height || 700) / 2).strength(0.02));
          graphSimulation.alpha(0.1).restart();
        }
        return;
      }

      graphInitialized = true;

      // SVG setup
      const contentArea = document.querySelector('.content-area');
      const rect = contentArea.getBoundingClientRect();
      const width = rect.width || window.innerWidth;
      const height = rect.height || 700;

      // Prepare nodes: skills only
      const nodes = SKILLS_DATA.skills.map(skill => ({
        id: skill.id,
        label: skill.label,
        domain: skill.domain,
        color: domainMap[skill.domain].color,
        connections: Object.keys(skillConnections[skill.id]).length || 0,
        x: width / 2 + (Math.random() - 0.5) * width * 0.5,
        y: height / 2 + (Math.random() - 0.5) * height * 0.5,
        fx: null,
        fy: null
      }));

      // Prepare links: skill-to-skill connections (weighted by shared sources)
      const links = [];
      const addedLinks = new Set();
      Object.entries(skillConnections).forEach(([skillId, connectedSkills]) => {
        Object.entries(connectedSkills).forEach(([targetId, sources]) => {
          const key = [skillId, targetId].sort().join('-');
          if (!addedLinks.has(key)) {
            links.push({
              source: skillId,
              target: targetId,
              sharedSources: sources.length,
              sourceIds: sources
            });
            addedLinks.add(key);
          }
        });
      });

      // Create source attractor nodes (invisible, for physics)
      const sourceAttractors = SKILLS_DATA.sources.map(source => ({
        id: `attractor-${source.id}`,
        sourceId: source.id,
        x: width / 2 + (Math.random() - 0.5) * width * 0.6,
        y: height / 2 + (Math.random() - 0.5) * height * 0.6,
        vy: 0,
        vx: 0
      }));

      // Create invisible links from skills to their source attractors
      const attractorLinks = SKILLS_DATA.links.map(link => ({
        source: link.skill,
        target: `attractor-${link.source}`,
        invisible: true,
        strength: 0.05
      }));

      const svg = d3.select('#graph')
        .attr('width', width)
        .attr('height', height);

      // Define arrow marker
      svg.append('defs').append('marker')
        .attr('id', 'arrowhead')
        .attr('markerWidth', 10)
        .attr('markerHeight', 10)
        .attr('refX', 9)
        .attr('refY', 3)
        .attr('orient', 'auto')
        .append('polygon')
        .attr('points', '0 0, 10 3, 0 6')
        .attr('fill', '#fff');

      // Combine all nodes for simulation
      const allNodes = [...nodes, ...sourceAttractors];

      // Create simulation
      graphSimulation = d3.forceSimulation(allNodes)
        .force('center', d3.forceCenter(width / 2, height / 2).strength(0.02))
        .force('charge', d3.forceManyBody().strength(-150))
        .force('collide', d3.forceCollide(d => {
          const node = d.id.startsWith('attractor-') ? 0 : 20 + (d.connections || 0) * 2;
          return node + 10;
        }).strength(0.8))
        .force('attractor-link', d3.forceLink(attractorLinks)
          .id(d => d.id)
          .distance(80)
          .strength(d => d.invisible ? 0.1 : 1))
        .force('skill-link', d3.forceLink(links)
          .id(d => d.id)
          .distance(d => 120 - d.sharedSources * 10)
          .strength(0.05))
        .alphaDecay(0.02);

      // Render skill-to-skill links
      const skillLinks = svg.selectAll('.skill-link')
        .data(links)
        .enter()
        .append('line')
        .attr('class', 'skill-link')
        .attr('stroke-width', d => 1 + d.sharedSources * 0.3);

      // Render skill nodes
      const skillNodeGroup = svg.selectAll('.skill-node')
        .data(nodes)
        .enter()
        .append('g')
        .attr('class', 'skill-node')
        .attr('data-id', d => d.id);

      const skillNodeCircles = skillNodeGroup.append('circle')
        .attr('class', 'skill-node-circle')
        .attr('r', d => 16 + d.connections * 1.5)
        .attr('fill', d => d.color);

      const skillNodeLabels = skillNodeGroup.append('text')
        .attr('class', 'skill-node-label')
        .text(d => d.label);

      // Update positions on simulation tick
      graphSimulation.on('tick', () => {
        skillLinks
          .attr('x1', d => d.source.x)
          .attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x)
          .attr('y2', d => d.target.y);

        skillNodeGroup
          .attr('transform', d => `translate(${d.x},${d.y})`);
      });

      // Helper: get connected skill IDs
      function getConnectedSkills(skillId) {
        return Object.keys(skillConnections[skillId] || {});
      }

      // Hover behavior
      skillNodeGroup.on('mouseenter', function(event, d) {
        const connectedIds = getConnectedSkills(d.id);

        skillNodeGroup.classed('dimmed', n => !connectedIds.includes(n.id) && n.id !== d.id);

        skillLinks.classed('highlighted', link => {
          return link.source.id === d.id || link.target.id === d.id;
        });
      });

      skillNodeGroup.on('mouseleave', function() {
        if (!selectedSkill) {
          skillNodeGroup.classed('dimmed', false);
          skillLinks.classed('highlighted', false);
        }
      });

      // Click to select
      skillNodeGroup.on('click', function(event, d) {
        event.stopPropagation();
        selectSkill(d.id);
        showDetailPanel(d);
      });

      // Deselect on background click
      svg.on('click', function() {
        if (selectedSkill) {
          clearSelection();
        }
      });

      // Drag behavior
      skillNodeGroup.call(d3.drag()
        .on('start', function(event, d) {
          if (!event.active) graphSimulation.alphaTarget(0.3).restart();
          d.fx = d.x;
          d.fy = d.y;
        })
        .on('drag', function(event, d) {
          d.fx = event.x;
          d.fy = event.y;
        })
        .on('end', function(event, d) {
          if (!event.active) graphSimulation.alphaTarget(0);
          d.fx = null;
          d.fy = null;
        })
      );

      // Double-click to reset view
      svg.on('dblclick', function() {
        nodes.forEach(n => { n.fx = null; n.fy = null; });
        graphSimulation.alphaTarget(0.3).restart();
        clearSelection();
      });

      // Update selection display
      function updateSelection(skillId) {
        skillNodeGroup.classed('selected', d => d.id === skillId);
        const connectedIds = getConnectedSkills(skillId);
        skillNodeGroup.classed('dimmed', n => !connectedIds.includes(n.id) && n.id !== skillId);
        skillLinks.classed('highlighted', link => link.source.id === skillId || link.target.id === skillId);
      }

      // Store for cross-view access
      window.graphUpdateSelection = updateSelection;
      window.graphClearSelection = () => {
        skillNodeGroup.classed('selected', false);
        skillNodeGroup.classed('dimmed', false);
        skillLinks.classed('highlighted', false);
      };

      // Handle window resize
      window.addEventListener('resize', () => {
        const r = contentArea.getBoundingClientRect();
        const newWidth = r.width || window.innerWidth;
        const newHeight = r.height || 700;
        svg.attr('width', newWidth).attr('height', newHeight);
        graphSimulation.force('center', d3.forceCenter(newWidth / 2, newHeight / 2).strength(0.02));
      });
    }

    // ========================================
    // SHARED SELECTION & DETAIL PANEL
    // ========================================
    function selectSkill(skillId) {
      selectedSkill = skillId;

      // Update grid view
      document.querySelectorAll('.skill-tag').forEach(tag => {
        tag.classList.remove('selected', 'dimmed');
      });

      const selectedTag = document.querySelector(`[data-skill-id="${skillId}"]`);
      if (selectedTag) {
        selectedTag.classList.add('selected');

        // Dim unconnected skills in grid
        const connectedIds = Object.keys(skillConnections[skillId] || {});
        document.querySelectorAll('.skill-tag').forEach(tag => {
          const id = tag.getAttribute('data-skill-id');
          if (id !== skillId && !connectedIds.includes(id)) {
            tag.classList.add('dimmed');
          }
        });

        // Mark domain section as having selection
        document.querySelectorAll('.domain-section').forEach(section => {
          const domain = section.getAttribute('data-domain');
          if (skillMap[skillId].domain === domain) {
            section.classList.add('has-selection');
          } else {
            section.classList.remove('has-selection');
          }
        });
      }

      // Update graph view if initialized
      if (graphInitialized && window.graphUpdateSelection) {
        window.graphUpdateSelection(skillId);
      }
    }

    function clearSelection() {
      selectedSkill = null;

      // Clear grid view
      document.querySelectorAll('.skill-tag').forEach(tag => {
        tag.classList.remove('selected', 'dimmed');
      });

      document.querySelectorAll('.domain-section').forEach(section => {
        section.classList.remove('has-selection');
      });

      // Clear graph view if initialized
      if (graphInitialized && window.graphClearSelection) {
        window.graphClearSelection();
      }

      closeDetailPanel();
    }

    function showDetailPanel(skill) {
      const sources = (skillToSources[skill.id] || []);
      const connected = Object.keys(skillConnections[skill.id] || {});

      // Header
      document.getElementById('panel-skill-name').textContent = skill.label;
      document.getElementById('panel-domain').textContent = domainMap[skill.domain].label;

      // Evidence
      const evidenceList = document.getElementById('evidence-list');
      evidenceList.innerHTML = '';
      sources.forEach(sourceId => {
        const source = sourceMap[sourceId];
        const typeLabel = source.type === 'certification' ? 'Cert' : (source.type === 'prototype' ? 'Prototype' : 'Project');
        const typeClass = source.type || 'project';
        const isClickable = source.type === 'certification' ? ' clickable' : '';
        const html = `
          <div class="evidence-item${isClickable}" ${source.type === 'certification' ? `data-cert-id="${source.id}"` : ''}>
            <div class="evidence-label">${source.label}<span class="evidence-type-pill ${typeClass}">${typeLabel}</span></div>
            <div class="evidence-meta">${source.issuer || ''}${source.year ? (source.issuer ? ' • ' : '') + source.year : ''}</div>
          </div>
        `;
        evidenceList.insertAdjacentHTML('beforeend', html);
      });
      if (sources.length > 0) {
        document.getElementById('evidence-section').style.display = 'block';
        // Add click handlers for clickable cert items
        evidenceList.querySelectorAll('.evidence-item.clickable').forEach(el => {
          el.addEventListener('click', () => {
            const certId = el.getAttribute('data-cert-id');
            if (certId && CERT_DETAILS[certId]) {
              showCertModal(certId);
            }
          });
        });
      } else {
        document.getElementById('evidence-section').style.display = 'none';
      }

      // Connected skills
      const connectedList = document.getElementById('connected-list');
      connectedList.innerHTML = '';
      connected.forEach(connectedId => {
        const connectedSkill = skillMap[connectedId];
        const sharedSources = skillConnections[skill.id][connectedId];
        const sharedSourceLabels = sharedSources.map(s => sourceMap[s].label).join(', ');
        const html = `
          <div class="connected-skill" data-id="${connectedId}">
            <div class="connected-skill-name">${connectedSkill.label}</div>
            <div class="connected-skill-via">via ${sharedSourceLabels}</div>
          </div>
        `;
        connectedList.insertAdjacentHTML('beforeend', html);
      });
      if (connected.length > 0) {
        document.getElementById('connected-section').style.display = 'block';

        // Add click handlers for connected skills
        connectedList.querySelectorAll('.connected-skill').forEach(el => {
          el.addEventListener('click', (e) => {
            e.stopPropagation();
            const connectedId = el.getAttribute('data-id');
            selectSkill(connectedId);
            showDetailPanel(skillMap[connectedId]);
          });
        });
      } else {
        document.getElementById('connected-section').style.display = 'none';
      }

      // Show panel
      document.getElementById('detail-panel').classList.add('active');
    }

    function closeDetailPanel() {
      document.getElementById('detail-panel').classList.remove('active');
    }

    // ========================================
    // VIEW SWITCHING
    // ========================================
    function switchView(newView) {
      if (currentView === newView) return;

      const gridView = document.getElementById('grid-view');
      const graphView = document.getElementById('graph-view');
      const toggleBtns = document.querySelectorAll('.toggle-btn');

      if (newView === 'grid') {
        graphView.classList.remove('active');
        gridView.classList.add('active');
        toggleBtns.forEach(btn => btn.classList.remove('active'));
        toggleBtns[0].classList.add('active');
        currentView = 'grid';

        if (graphSimulation) {
          graphSimulation.stop();
        }
      } else if (newView === 'graph') {
        if (window.innerWidth < 768) return;

        gridView.classList.remove('active');
        graphView.classList.add('active');
        toggleBtns.forEach(btn => btn.classList.remove('active'));
        toggleBtns[1].classList.add('active');
        currentView = 'graph';

        // Use setTimeout to ensure browser has fully laid out the container
        setTimeout(() => initializeGraphView(), 100);
      }
    }

    // ========================================
    // EVENT LISTENERS
    // ========================================
    document.querySelectorAll('.toggle-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        switchView(btn.getAttribute('data-view'));
      });
    });

    document.getElementById('close-panel').addEventListener('click', () => {

    function showCertModal(certId) {
      const cert = CERT_DETAILS[certId];
      if (!cert) return;

      const modal = document.getElementById('cert-modal');
      const content = document.getElementById('cert-modal-content');

      let html = `
        <button class="cert-modal-close" id="cert-modal-close">&times;</button>
        <div class="cert-modal-header">
          <img src="${cert.logo}" alt="${cert.issuer}" class="cert-modal-logo">
          <div>
            <div class="cert-modal-title">${cert.name}</div>
            <div class="cert-modal-issuer">${cert.issuer}</div>
            ${cert.credential ? `<div class="cert-modal-credential">${cert.credential}</div>` : ''}
          </div>
        </div>
        <div class="cert-modal-section">
          <div class="cert-modal-section-label">What I Learned</div>
          <div class="cert-modal-section-text">${cert.learned}</div>
        </div>
        <div class="cert-modal-section">
          <div class="cert-modal-section-label">Skills Covered</div>
          <div class="cert-modal-tags">
            ${cert.skills.map(s => `<span class="cert-modal-tag">${s}</span>`).join('')}
          </div>
        </div>
        <div class="cert-modal-capstone">
          <div class="cert-modal-capstone-label">${cert.capstoneLabel}</div>
          <div class="cert-modal-capstone-text">${cert.capstone}</div>
        </div>
      `;

      content.innerHTML = html;
      modal.classList.add('active');

      // Close handlers
      document.getElementById('cert-modal-close').addEventListener('click', closeCertModal);
    }

    function closeCertModal() {
      document.getElementById('cert-modal').classList.remove('active');
    }

    // Close cert modal on overlay click
    document.getElementById('cert-modal').addEventListener('click', function(e) {
      if (e.target === this) closeCertModal();
    });

    // Close cert modal on Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeCertModal();
    });

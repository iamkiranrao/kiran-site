<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 920" style="width:100%;max-width:680px;height:auto;">
  <defs>
    <style>
      /* Adapt to page theme via CSS variables with dark-mode fallbacks */
      .diagram-bg { fill: var(--bg-primary, #0a0a0a); }
      .label-primary { fill: var(--text-primary, #f0e6d3); font-family: 'Inter', system-ui, sans-serif; }
      .label-secondary { fill: var(--text-secondary, #f0e6d3); font-family: 'Inter', system-ui, sans-serif; }
      .label-muted { fill: var(--text-muted, #5a5347); font-family: 'Inter', system-ui, sans-serif; }
      .box-stroke { stroke: var(--border, #222222); fill: none; stroke-width: 1.5; }
      .box-fill-hw { fill: rgba(240,230,211,0.04); stroke: rgba(240,230,211,0.15); stroke-width: 1.5; rx: 8; }
      .box-fill-sw { fill: rgba(240,230,211,0.04); stroke: rgba(240,230,211,0.15); stroke-width: 1.5; rx: 8; }
      .box-fill-cloud { fill: rgba(240,230,211,0.04); stroke: rgba(240,230,211,0.15); stroke-width: 1.5; rx: 8; }
      .box-fill-network { fill: rgba(240,230,211,0.04); stroke: rgba(240,230,211,0.15); stroke-width: 1.5; rx: 8; }
      .box-inner { fill: rgba(240,230,211,0.06); stroke: rgba(240,230,211,0.1); stroke-width: 1; rx: 6; }
      .arrow-line { stroke: var(--text-muted, #5a5347); stroke-width: 1.5; fill: none; }
      .arrow-head { fill: var(--text-muted, #5a5347); }
      .flow-num { fill: var(--text-primary, #f0e6d3); font-family: 'Inter', system-ui, sans-serif; font-weight: 700; font-size: 11px; }
      .flow-circle { fill: rgba(240,230,211,0.1); stroke: rgba(240,230,211,0.25); stroke-width: 1; }
      .divider { stroke: var(--border, #222222); stroke-width: 1; stroke-dasharray: 4 4; }
      .layer-label { fill: var(--text-muted, #5a5347); font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; }

      /* Light theme overrides */
      [data-theme="light"] .box-fill-hw,
      [data-theme="light"] .box-fill-sw,
      [data-theme="light"] .box-fill-cloud,
      [data-theme="light"] .box-fill-network { fill: rgba(10,10,10,0.03); stroke: rgba(10,10,10,0.12); }
      [data-theme="light"] .box-inner { fill: rgba(10,10,10,0.04); stroke: rgba(10,10,10,0.08); }
      [data-theme="light"] .flow-circle { fill: rgba(10,10,10,0.06); stroke: rgba(10,10,10,0.15); }
    </style>

    <!-- Arrowhead marker -->
    <marker id="arrowDown" markerWidth="8" markerHeight="6" refX="4" refY="3" orient="auto">
      <path d="M0,0 L4,6 L8,0" class="arrow-head"/>
    </marker>
    <marker id="arrowRight" markerWidth="6" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L6,4 L0,8" class="arrow-head"/>
    </marker>
    <marker id="arrowLeft" markerWidth="6" markerHeight="8" refX="0" refY="4" orient="auto">
      <path d="M6,0 L0,4 L6,8" class="arrow-head"/>
    </marker>
    <marker id="arrowUp" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <path d="M0,6 L4,0 L8,6" class="arrow-head"/>
    </marker>
  </defs>

  <!-- ====================================
       TITLE
       ==================================== -->
  <text x="340" y="32" text-anchor="middle" class="label-primary" font-size="15" font-weight="700" letter-spacing="-0.03em">Apple Pay: System Architecture</text>
  <text x="340" y="52" text-anchor="middle" class="label-muted" font-size="11">How a tap becomes a payment — from device to settlement</text>

  <!-- ====================================
       LAYER 1: USER'S DEVICE (y: 70–340)
       ==================================== -->
  <text x="20" y="82" class="layer-label">DEVICE LAYER</text>
  <rect x="20" y="90" width="640" height="255" class="box-fill-hw" rx="8"/>

  <!-- iPhone outline -->
  <rect x="40" y="108" width="180" height="220" rx="20" stroke="rgba(240,230,211,0.2)" stroke-width="1.5" fill="none"/>
  <text x="130" y="134" text-anchor="middle" class="label-primary" font-size="12" font-weight="600">iPhone</text>

  <!-- Secure Element box inside phone -->
  <rect x="56" y="148" width="148" height="68" class="box-inner" rx="6"/>
  <text x="130" y="168" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Secure Element (SE)</text>
  <text x="130" y="183" text-anchor="middle" class="label-muted" font-size="9">Tamper-resistant chip</text>
  <text x="130" y="196" text-anchor="middle" class="label-muted" font-size="9">Stores tokens &amp; crypto keys</text>
  <text x="130" y="209" text-anchor="middle" class="label-muted" font-size="9">Isolated from iOS</text>

  <!-- Wallet / iOS box inside phone -->
  <rect x="56" y="226" width="148" height="52" class="box-inner" rx="6"/>
  <text x="130" y="248" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Wallet App + iOS</text>
  <text x="130" y="263" text-anchor="middle" class="label-muted" font-size="9">UX, biometrics, orchestration</text>

  <!-- Biometric Auth -->
  <rect x="56" y="288" width="148" height="28" class="box-inner" rx="6"/>
  <text x="130" y="307" text-anchor="middle" class="label-muted" font-size="10">Face ID / Touch ID</text>

  <!-- NFC box (right side of device) -->
  <rect x="240" y="108" width="160" height="65" class="box-inner" rx="6"/>
  <text x="320" y="132" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">NFC Controller</text>
  <text x="320" y="148" text-anchor="middle" class="label-muted" font-size="9">Near Field Communication</text>
  <text x="320" y="161" text-anchor="middle" class="label-muted" font-size="9">Contactless data exchange</text>

  <!-- Token Generation box -->
  <rect x="240" y="188" width="160" height="55" class="box-inner" rx="6"/>
  <text x="320" y="210" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Token + Cryptogram</text>
  <text x="320" y="225" text-anchor="middle" class="label-muted" font-size="9">Device Account Number (DAN)</text>
  <text x="320" y="238" text-anchor="middle" class="label-muted" font-size="9">One-time dynamic security code</text>

  <!-- What's NOT stored callout -->
  <rect x="420" y="108" width="226" height="135" rx="6" fill="rgba(240,230,211,0.03)" stroke="rgba(240,230,211,0.08)" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="533" y="130" text-anchor="middle" class="label-muted" font-size="10" font-weight="600">What stays on-device</text>
  <text x="436" y="150" class="label-muted" font-size="9">&#x2713;  Device Account Number (token)</text>
  <text x="436" y="166" class="label-muted" font-size="9">&#x2713;  Cryptographic keys (in SE)</text>
  <text x="436" y="182" class="label-muted" font-size="9">&#x2713;  Biometric data</text>
  <line x1="436" y1="196" x2="630" y2="196" stroke="rgba(240,230,211,0.08)" stroke-width="1"/>
  <text x="533" y="212" text-anchor="middle" class="label-muted" font-size="10" font-weight="600">What's NEVER stored</text>
  <text x="436" y="230" class="label-muted" font-size="9">&#x2717;  Actual card number (PAN)</text>

  <!-- Arrow: SE to Token -->
  <line x1="204" y1="182" x2="238" y2="210" class="arrow-line" marker-end="url(#arrowRight)"/>

  <!-- Arrow: Wallet to SE -->
  <line x1="130" y1="226" x2="130" y2="218" class="arrow-line" marker-end="url(#arrowUp)"/>

  <!-- Arrow: Biometric to Wallet -->
  <line x1="130" y1="288" x2="130" y2="280" class="arrow-line" marker-end="url(#arrowUp)"/>

  <!-- ====================================
       FLOW STEP 1: User authenticates
       ==================================== -->
  <circle cx="42" y="82" cy="302" r="10" class="flow-circle"/>
  <text x="42" y="306" text-anchor="middle" class="flow-num">1</text>
  <text x="436" y="268" class="label-secondary" font-size="9" font-style="italic">User double-clicks + Face ID</text>

  <!-- ====================================
       ARROW: Device to Merchant (NFC)
       ==================================== -->
  <line x1="320" y1="173" x2="320" y2="365" class="arrow-line" marker-end="url(#arrowDown)"/>
  <circle cx="320" cy="360" r="10" class="flow-circle"/>
  <text x="320" y="364" text-anchor="middle" class="flow-num">2</text>

  <!-- ====================================
       LAYER 2: MERCHANT / POS (y: 370–440)
       ==================================== -->
  <text x="20" y="362" class="layer-label">MERCHANT LAYER</text>
  <rect x="20" y="370" width="640" height="75" class="box-fill-network" rx="8"/>
  <rect x="190" y="382" width="260" height="50" class="box-inner" rx="6"/>
  <text x="320" y="404" text-anchor="middle" class="label-primary" font-size="12" font-weight="600">POS Terminal</text>
  <text x="320" y="420" text-anchor="middle" class="label-muted" font-size="9">Receives tokenised payment — never sees real card number</text>

  <!-- Merchant receives token callout -->
  <rect x="470" y="382" width="178" height="50" rx="6" fill="rgba(240,230,211,0.03)" stroke="rgba(240,230,211,0.08)" stroke-width="1"/>
  <text x="559" y="402" text-anchor="middle" class="label-muted" font-size="9" font-weight="600">Merchant sees:</text>
  <text x="559" y="418" text-anchor="middle" class="label-muted" font-size="9">Token (looks like a card #)</text>
  <text x="559" y="428" text-anchor="middle" class="label-muted" font-size="8">+ cryptogram — useless if stolen</text>

  <!-- ====================================
       ARROW: Merchant to Payment Network
       ==================================== -->
  <line x1="320" y1="445" x2="320" y2="490" class="arrow-line" marker-end="url(#arrowDown)"/>
  <circle cx="320" cy="472" r="10" class="flow-circle"/>
  <text x="320" y="476" text-anchor="middle" class="flow-num">3</text>
  <text x="338" y="476" class="label-muted" font-size="9" font-style="italic">Existing card rails</text>

  <!-- ====================================
       LAYER 3: PAYMENT NETWORK (y: 490–585)
       ==================================== -->
  <text x="20" y="488" class="layer-label">NETWORK LAYER</text>
  <rect x="20" y="495" width="640" height="95" class="box-fill-sw" rx="8"/>

  <!-- Acquirer -->
  <rect x="40" y="510" width="155" height="65" class="box-inner" rx="6"/>
  <text x="117" y="534" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Acquirer / Processor</text>
  <text x="117" y="550" text-anchor="middle" class="label-muted" font-size="9">Merchant's bank</text>
  <text x="117" y="563" text-anchor="middle" class="label-muted" font-size="9">Routes transaction</text>

  <!-- Card Network -->
  <rect x="220" y="510" width="200" height="65" class="box-inner" rx="6"/>
  <text x="320" y="534" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Card Network</text>
  <text x="320" y="550" text-anchor="middle" class="label-muted" font-size="9">Visa / Mastercard / Amex</text>
  <text x="320" y="563" text-anchor="middle" class="label-muted" font-size="9">Switches transaction to issuer</text>

  <!-- TSP -->
  <rect x="445" y="510" width="200" height="65" class="box-inner" rx="6"/>
  <text x="545" y="534" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Token Service Provider</text>
  <text x="545" y="550" text-anchor="middle" class="label-muted" font-size="9">Maps token → real card (PAN)</text>
  <text x="545" y="563" text-anchor="middle" class="label-muted" font-size="9">Visa/MC Token Vault</text>

  <!-- Arrows between network boxes -->
  <line x1="195" y1="542" x2="218" y2="542" class="arrow-line" marker-end="url(#arrowRight)"/>
  <line x1="420" y1="542" x2="443" y2="542" class="arrow-line" marker-end="url(#arrowRight)"/>

  <!-- ====================================
       ARROW: Network to Issuing Bank
       ==================================== -->
  <line x1="320" y1="590" x2="320" y2="635" class="arrow-line" marker-end="url(#arrowDown)"/>
  <circle cx="320" cy="618" r="10" class="flow-circle"/>
  <text x="320" y="622" text-anchor="middle" class="flow-num">4</text>

  <!-- ====================================
       LAYER 4: ISSUING BANK (y: 635–730)
       ==================================== -->
  <text x="20" y="633" class="layer-label">ISSUING BANK LAYER</text>
  <rect x="20" y="640" width="640" height="95" class="box-fill-cloud" rx="8"/>

  <rect x="40" y="656" width="195" height="65" class="box-inner" rx="6"/>
  <text x="137" y="678" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Token Vault</text>
  <text x="137" y="694" text-anchor="middle" class="label-muted" font-size="9">De-tokenises: token → PAN</text>
  <text x="137" y="707" text-anchor="middle" class="label-muted" font-size="9">Verifies cryptogram validity</text>

  <rect x="260" y="656" width="195" height="65" class="box-inner" rx="6"/>
  <text x="357" y="678" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Auth &amp; Fraud Engine</text>
  <text x="357" y="694" text-anchor="middle" class="label-muted" font-size="9">Balance / credit check</text>
  <text x="357" y="707" text-anchor="middle" class="label-muted" font-size="9">Risk scoring &amp; fraud models</text>

  <rect x="480" y="656" width="165" height="65" class="box-inner" rx="6"/>
  <text x="562" y="678" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Approve / Decline</text>
  <text x="562" y="694" text-anchor="middle" class="label-muted" font-size="9">Response sent back</text>
  <text x="562" y="707" text-anchor="middle" class="label-muted" font-size="9">through same rails</text>

  <!-- Arrows between bank boxes -->
  <line x1="235" y1="688" x2="258" y2="688" class="arrow-line" marker-end="url(#arrowRight)"/>
  <line x1="455" y1="688" x2="478" y2="688" class="arrow-line" marker-end="url(#arrowRight)"/>

  <!-- ====================================
       RETURN PATH: Approval back to device
       ==================================== -->
  <!-- Step 5 arrow going back up on the left side -->
  <line x1="40" y1="735" x2="40" y2="760" class="arrow-line"/>
  <line x1="40" y1="760" x2="16" y2="760" class="arrow-line"/>
  <line x1="16" y1="760" x2="16" y2="407" class="arrow-line"/>
  <line x1="16" y1="407" x2="20" y2="407" class="arrow-line" marker-end="url(#arrowRight)"/>
  <circle cx="16" cy="760" r="10" class="flow-circle"/>
  <text x="16" y="764" text-anchor="middle" class="flow-num">5</text>
  <text x="30" y="778" class="label-muted" font-size="9" font-style="italic">Approval flows back to terminal → device</text>

  <!-- ====================================
       APPLE CLOUD SERVICES (sidebar, y: 790–900)
       ==================================== -->
  <text x="20" y="808" class="layer-label">APPLE CLOUD LAYER</text>
  <rect x="20" y="815" width="640" height="90" class="box-fill-cloud" rx="8"/>

  <rect x="40" y="830" width="185" height="60" class="box-inner" rx="6"/>
  <text x="132" y="852" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Provisioning Service</text>
  <text x="132" y="868" text-anchor="middle" class="label-muted" font-size="9">Card setup &amp; verification</text>
  <text x="132" y="881" text-anchor="middle" class="label-muted" font-size="9">Coordinates with bank for token</text>

  <rect x="245" y="830" width="185" height="60" class="box-inner" rx="6"/>
  <text x="337" y="852" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Device Management</text>
  <text x="337" y="868" text-anchor="middle" class="label-muted" font-size="9">Multi-device token lifecycle</text>
  <text x="337" y="881" text-anchor="middle" class="label-muted" font-size="9">Remote wipe if device lost</text>

  <rect x="450" y="830" width="196" height="60" class="box-inner" rx="6"/>
  <text x="548" y="852" text-anchor="middle" class="label-primary" font-size="11" font-weight="600">Identity Services</text>
  <text x="548" y="868" text-anchor="middle" class="label-muted" font-size="9">IDs, transit cards, student IDs</text>
  <text x="548" y="881" text-anchor="middle" class="label-muted" font-size="9">Same SE architecture, new uses</text>

  <!-- Dashed line connecting cloud to device -->
  <line x1="132" y1="830" x2="132" y2="345" class="divider" stroke-dasharray="4 4"/>
  <text x="138" y="788" class="label-muted" font-size="8" font-style="italic">Provisioning (card setup only — not during payments)</text>

</svg>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Onboardly - NovaCorp HR Assistant powered by RAG + Claude">
    <title>Onboardly - NovaCorp HR Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-chat: #161616;
            --text-primary: #f0e6d3;
            --text-secondary: #a09888;
            --text-muted: #5a5347;
            --accent: #10b981;
            --accent-dim: rgba(16, 185, 129, 0.1);
            --border: #222222;
            --bot-bg: #1a1a1a;
            --user-bg: #0f3b1a;
            --success: #10b981;
            --error: #f87171;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-primary);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }

        .header-content {
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .header-title-accent {
            color: var(--accent);
        }

        .header-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.01em;
        }

        .header-info {
            position: relative;
            display: inline-flex;
            align-items: center;
            cursor: help;
            margin-left: 0.5rem;
        }

        .info-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            color: var(--accent);
            font-weight: 600;
        }

        .info-tooltip {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: var(--bg-secondary);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            white-space: nowrap;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.2s ease;
            z-index: 20;
        }

        .info-tooltip::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 4px solid var(--accent);
        }

        .header-info:hover .info-tooltip {
            opacity: 1;
            visibility: visible;
        }

        /* ============================================
           MAIN CHAT AREA
           ============================================ */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* Welcome state */
        .welcome-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            padding: 2rem;
            text-align: center;
        }

        .welcome-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        /* Message bubbles */
        .message {
            max-width: 75%;
            padding: 0.85rem 1.15rem;
            border-radius: 12px;
            font-size: 0.88rem;
            line-height: 1.6;
            animation: messageIn 0.3s ease;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-bg);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bg);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-bottom-right-radius: 4px;
        }

        /* Message content */
        .message-content {
            margin-bottom: 0.5rem;
        }

        .message-content strong {
            color: var(--accent);
            font-weight: 600;
        }

        .message-content a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent);
            transition: opacity 0.2s;
        }

        .message-content a:hover {
            opacity: 0.8;
        }

        /* Sources section */
        .message-sources {
            margin-top: 0.75rem;
            padding-top: 0.5rem;
            border-top: 1px solid rgba(16, 185, 129, 0.2);
        }

        .sources-header {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            cursor: pointer;
            user-select: none;
        }

        .sources-toggle-icon {
            display: inline-block;
            transition: transform 0.2s ease;
            font-size: 0.6rem;
        }

        .sources-toggle-icon.open {
            transform: rotate(180deg);
        }

        .sources-list {
            max-height: 500px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .sources-list.hidden {
            max-height: 0;
            overflow: hidden;
        }

        .source-item {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 0.3rem 0.5rem;
            background: rgba(16, 185, 129, 0.05);
            border-radius: 4px;
            border-left: 2px solid var(--accent);
            line-height: 1.4;
        }

        .source-doc {
            color: var(--accent);
            font-weight: 500;
        }

        .source-snippet {
            display: block;
            margin-top: 0.15rem;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Typing indicator */
        .typing-indicator {
            align-self: flex-start;
            padding: 0.85rem 1.15rem;
            background: var(--bot-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 0.3rem;
            align-items: center;
        }

        .typing-label {
            font-size: 0.88rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .typing-dots {
            display: flex;
            gap: 0.3rem;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* Suggested questions */
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            padding: 0 2rem 0.75rem;
        }

        .suggestion {
            padding: 0.5rem 0.95rem;
            border-radius: 500px;
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .suggestion:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
            transform: translateY(-2px);
        }

        /* ============================================
           INPUT AREA
           ============================================ */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            gap: 0.75rem;
            background: var(--bg-primary);
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-chat);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: border-color 0.2s;
            resize: none;
            max-height: 100px;
        }

        .chat-input:focus {
            border-color: var(--accent);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .chat-send {
            padding: 0.75rem 1.25rem;
            border-radius: 10px;
            border: none;
            background: var(--accent);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .chat-send:hover:not(:disabled) {
            opacity: 0.85;
        }

        .chat-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Error message */
        .error-message {
            align-self: center;
            padding: 0.75rem 1rem;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid var(--error);
            border-radius: 8px;
            color: var(--error);
            font-size: 0.8rem;
            text-align: center;
            max-width: 90%;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 600px) {
            .header {
                padding: 1rem 1rem;
            }

            .header-left {
                gap: 0.75rem;
            }

            .header-title {
                font-size: 1rem;
            }

            .header-subtitle {
                font-size: 0.7rem;
            }

            .chat-messages {
                padding: 1rem;
            }

            .input-area {
                padding: 0.75rem 1rem;
            }

            .message {
                max-width: 90%;
                padding: 0.7rem 0.95rem;
                font-size: 0.85rem;
            }

            .suggestion {
                flex: 0 1 calc(50% - 0.3rem);
            }

            .suggestions {
                padding: 0 1rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-content">
                <div class="header-title">
                    <span class="header-title-accent">Onboardly</span>
                </div>
                <div class="header-subtitle">NovaCorp HR Assistant</div>
            </div>
            <div class="header-info">
                <div class="info-icon">?</div>
                <div class="info-tooltip">Powered by RAG + Claude. Answers are grounded in NovaCorp's HR documents.</div>
            </div>
        </div>
    </div>

    <!-- Main Chat Area -->
    <div class="main">
        <div class="chat-container">
            <div class="chat-messages" id="chatMessages"></div>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
            <input
                type="text"
                class="chat-input"
                id="chatInput"
                placeholder="Ask about leave, benefits, IT setup, remote work, expenses..."
                autocomplete="off"
            >
            <button class="chat-send" id="chatSend">Send</button>
        </div>
    </div>

    <script>
        // ============================================
        // STATE & CONFIG
        // ============================================
        const API_ENDPOINT = '/api/chat';
        let sessionId = generateSessionId();
        let isWaiting = false;

        // Mock data for testing (can be removed when API is ready)
        const mockResponses = {
            'leave': {
                text: "According to NovaCorp's Leave Policy, eligible employees receive:\n\n• **Annual Leave:** 20 days per year\n• **Sick Leave:** 10 days per year\n• **Public Holidays:** As per local government calendar\n• **Special Leave:** Up to 5 days for special circumstances (with approval)\n\nYou can request leave through the HR portal. Your manager will receive a notification for approval.",
                sources: [
                    { doc: 'Leave_Policy_2024.pdf', snippet: 'Annual leave entitlement: 20 days per calendar year' },
                    { doc: 'HR_Manual_Ch3.docx', snippet: 'Leave requests must be submitted 2 weeks in advance when possible' }
                ]
            },
            'laptop': {
                text: "We offer several laptop options for new hires:\n\n• **MacBook Pro 14\":** Default option for most roles\n• **Dell XPS 15:** Available for Windows-preferred users\n• **ThinkPad X1:** For development and engineering roles\n\nPlease specify your preference during onboarding. Setup takes 2-3 business days.",
                sources: [
                    { doc: 'Equipment_Allowance.pdf', snippet: 'Standard laptop provision for all full-time employees' },
                    { doc: 'Onboarding_Checklist.docx', snippet: 'IT equipment delivery within 3 business days' }
                ]
            },
            'expenses': {
                text: "To submit expenses:\n\n1. Log into the **Expense Management Portal**\n2. Click \"New Expense Report\"\n3. Add receipts and categorize (Travel, Meals, Software, etc.)\n4. Submit for manager approval\n5. Finance team processes within 5 business days\n\nKeep all receipts for 2 years. Personal reimbursement limit is $500 per transaction unless pre-approved.",
                sources: [
                    { doc: 'Expense_Policy.pdf', snippet: 'Reimbursement processed within 5 business days of approval' },
                    { doc: 'Travel_Guidelines.docx', snippet: 'Keep original receipts for audit purposes' }
                ]
            },
            'remote': {
                text: "NovaCorp supports flexible work arrangements:\n\n• **Remote Days:** Up to 3 days per week (flexible arrangement)\n• **Core Hours:** 10 AM - 3 PM timezone overlap required\n• **Equipment:** $500 home office stipend for approved remote workers\n• **Office Access:** Desk available for collaboration days\n\nDiscuss remote arrangements with your manager and document in your work agreement.",
                sources: [
                    { doc: 'Remote_Work_Policy.pdf', snippet: 'Employees may work remotely up to 60% of scheduled hours' },
                    { doc: 'Work_Agreement_Template.docx', snippet: 'Remote work requires manager approval and documented agreement' }
                ]
            },
            'default': {
                text: "I'm Onboardly, your NovaCorp HR Assistant! I can help you with:\n\n• **Leave Policies** — Annual, sick, and special leave\n• **Benefits** — Health insurance, retirement plans, perks\n• **IT Setup** — Laptop options, access provisioning\n• **Remote Work** — Work-from-home policies\n• **Expenses** — How to submit and get reimbursed\n\nWhat would you like to know?",
                sources: []
            }
        };

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function generateSessionId() {
            return 'session_' + Math.random().toString(36).substr(2, 9);
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ============================================
        // DOM ELEMENTS
        // ============================================
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const chatSend = document.getElementById('chatSend');
        const suggestionsContainer = document.getElementById('suggestions');

        // ============================================
        // MESSAGE RENDERING
        // ============================================
        function addMessage(text, type, sources = []) {
            // Remove typing indicator if present
            const typing = document.querySelector('.typing-indicator');
            if (typing) typing.remove();

            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatText(text);
            messageDiv.appendChild(contentDiv);

            // Add sources if bot message has them
            if (type === 'bot' && sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'message-sources';

                const header = document.createElement('div');
                header.className = 'sources-header';
                header.innerHTML = '<span class="sources-toggle-icon open">▼</span> Sources';
                header.addEventListener('click', () => {
                    const list = header.nextElementSibling;
                    list.classList.toggle('hidden');
                    header.querySelector('.sources-toggle-icon').classList.toggle('open');
                });
                sourcesDiv.appendChild(header);

                const sourcesList = document.createElement('div');
                sourcesList.className = 'sources-list';
                sources.forEach(source => {
                    const item = document.createElement('div');
                    item.className = 'source-item';
                    item.innerHTML = `<span class="source-doc">${source.doc}</span><span class="source-snippet">"${source.snippet}"</span>`;
                    sourcesList.appendChild(item);
                });
                sourcesDiv.appendChild(sourcesList);

                messageDiv.appendChild(sourcesDiv);
            }

            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        function formatText(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="typing-label">
                    <span class="header-title-accent">Onboardly</span> is thinking...
                </div>
                <div class="typing-dots">
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                    <span class="typing-dot"></span>
                </div>
            `;
            chatMessages.appendChild(typingDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 0);
        }

        // ============================================
        // SUGGESTIONS
        // ============================================
        const suggestedQuestions = [
            "How many days of annual leave do I get?",
            "What laptop options are available?",
            "How do I submit expenses?",
            "What's the remote work policy?"
        ];

        function renderSuggestions(questions) {
            suggestionsContainer.innerHTML = '';
            questions.forEach(question => {
                const btn = document.createElement('button');
                btn.className = 'suggestion';
                btn.textContent = question;
                btn.addEventListener('click', () => handleUserMessage(question));
                suggestionsContainer.appendChild(btn);
            });
        }

        function clearSuggestions() {
            suggestionsContainer.innerHTML = '';
        }

        // ============================================
        // CHAT HANDLER
        // ============================================
        async function handleUserMessage(message) {
            if (!message.trim() || isWaiting) return;

            isWaiting = true;
            chatSend.disabled = true;
            clearSuggestions();

            // Add user message
            addMessage(message, 'user');
            chatInput.value = '';

            try {
                // Show typing indicator
                showTyping();
                await sleep(500);

                // Call API
                const response = await fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                }).catch(() => {
                    // Demo mode: use mock responses
                    return null;
                });

                let responseData;
                if (response && response.ok) {
                    responseData = await response.json();
                } else {
                    // Mock response based on keywords
                    const lowerMsg = message.toLowerCase();
                    if (lowerMsg.includes('leave') || lowerMsg.includes('vacation') || lowerMsg.includes('annual')) {
                        responseData = mockResponses.leave;
                    } else if (lowerMsg.includes('laptop') || lowerMsg.includes('computer') || lowerMsg.includes('equipment')) {
                        responseData = mockResponses.laptop;
                    } else if (lowerMsg.includes('expense') || lowerMsg.includes('reimburs') || lowerMsg.includes('submit')) {
                        responseData = mockResponses.expenses;
                    } else if (lowerMsg.includes('remote') || lowerMsg.includes('work from') || lowerMsg.includes('home')) {
                        responseData = mockResponses.remote;
                    } else {
                        responseData = mockResponses.default;
                    }
                }

                // Remove typing indicator
                const typing = document.querySelector('.typing-indicator');
                if (typing) typing.remove();

                // Add bot response with sources
                addMessage(responseData.text || "I'm not sure how to answer that. Please try another question.", 'bot', responseData.sources || []);

            } catch (error) {
                console.error('Chat error:', error);
                const typing = document.querySelector('.typing-indicator');
                if (typing) typing.remove();
                addMessage('Sorry, something went wrong. Please try again.', 'bot');
            } finally {
                isWaiting = false;
                chatSend.disabled = false;
                chatInput.focus();
                renderSuggestions(suggestedQuestions);
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        chatSend.addEventListener('click', () => {
            handleUserMessage(chatInput.value);
        });

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !isWaiting) {
                e.preventDefault();
                handleUserMessage(chatInput.value);
            }
        });

        // ============================================
        // INITIALIZATION
        // ============================================
        function init() {
            // Show welcome message
            addMessage(
                "Hey! I'm Onboardly, NovaCorp's HR assistant. I can answer questions about leave policies, benefits, IT setup, remote work, expenses, and more. What would you like to know?",
                'bot'
            );

            // Show suggested questions
            renderSuggestions(suggestedQuestions);

            // Focus input
            chatInput.focus();
        }

        // Start on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento Monster Preview — Persona Tabs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Archivo+Black&family=Orbitron:wght@400;700;900&family=Caveat:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&family=Corben:wght@400;700&family=Josefin+Sans:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --card-bg-accent: #D4A853;
    --glass-text-dark: #F0E6D8;
    --glass-text-dark-secondary: #C8BBA8;
    --glass-text-dark-muted: #9A8E80;
    --font-stat: 'Bebas Neue', sans-serif;
    --font-body: 'Inter', sans-serif;
    --row-height: 220px;
    --grid-gap: 0.75rem;
}

body {
    font-family: var(--font-body);
    background: #1a1715;
    color: #f0e6d8;
    padding: 1.5rem;
}

.preview-header {
    text-align: center;
    margin-bottom: 1rem;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
}
.preview-header h2 {
    font-family: var(--font-stat);
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--glass-text-dark-muted);
    margin-bottom: 0.3rem;
}
.preview-header p {
    font-size: 0.75rem;
    color: var(--glass-text-dark-muted);
    opacity: 0.6;
    line-height: 1.5;
}

/* ══════════════════════════════════════════════════
   PERSONA TABS
   ══════════════════════════════════════════════════ */
.persona-tabs {
    max-width: 1440px;
    margin: 0 auto 1rem;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
}
.persona-tabs .tab-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--glass-text-dark-muted);
    margin-right: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
.persona-tab {
    padding: 0.35rem 0.8rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--glass-text-dark-secondary);
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    cursor: pointer;
    transition: all 0.2s;
}
.persona-tab:hover { background: rgba(255,255,255,0.1); }
.persona-tab.active {
    background: rgba(212,168,83,0.2);
    border-color: rgba(212,168,83,0.4);
    color: var(--card-bg-accent);
}
.image-status {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: var(--glass-text-dark-muted);
}
.image-status .has { color: #5BBA6F; }
.image-status .missing { color: #B85C5C; }

/* ══════════════════════════════════════════════════
   BENTO GRID
   ══════════════════════════════════════════════════ */
.work-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: var(--row-height);
    gap: var(--grid-gap);
    max-width: 1440px;
    margin: 0 auto;
}

/* ── Card Base ── */
.work-card {
    border-radius: 16px;
    position: relative;
    cursor: pointer;
    text-align: left;
    width: 100%;
    display: flex;
    flex-direction: column;
    border: none;
    font-family: inherit;
    overflow: hidden;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.work-card:hover { transform: translateY(-3px); z-index: 10; }

/* ── Backgrounds ── */
.card-bg {
    position: absolute;
    inset: 0;
    border-radius: 16px;
    overflow: hidden;
    z-index: 0;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
}
.card-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), inset 0 -1px 0 rgba(0,0,0,0.1);
    pointer-events: none;
}
.work-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    pointer-events: none;
    z-index: 5;
}
.work-card:hover::before { border-color: rgba(255,255,255,0.15); }

/* ── No-image indicator ── */
.card-bg.no-image::before {
    content: attr(data-need);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.5rem;
    color: rgba(255,255,255,0.12);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    white-space: nowrap;
    pointer-events: none;
}

/* ══════════════════════════════════════════════════
   FLOATING GLASS OVERLAY
   ══════════════════════════════════════════════════ */
.card-overlay {
    position: absolute;
    z-index: 3;
    width: fit-content;
    max-width: 75%;
    padding: 0.75rem 1rem;
    background: rgba(16, 14, 12, 0.85);
    backdrop-filter: blur(12px) saturate(1.2);
    -webkit-backdrop-filter: blur(12px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    transition: all 0.3s ease;
}

/* ── Position classes ── */
.pos-bl .card-overlay { bottom: 0.75rem; left: 0.75rem; }
.pos-br .card-overlay { bottom: 0.75rem; right: 0.75rem; }
.pos-tl .card-overlay { top: 0.75rem; left: 0.75rem; }
.pos-tr .card-overlay { top: 0.75rem; right: 0.75rem; }
.pos-bc .card-overlay { bottom: 0.75rem; left: 50%; transform: translateX(-50%); }
.pos-tc .card-overlay { top: 20%; left: 50%; transform: translateX(-50%); }

/* Text alignment for bottom-center and top-center */
.pos-bc .card-glass,
.pos-tc .card-glass { align-items: center; text-align: center; }
.pos-bc .work-tags,
.pos-tc .work-tags { justify-content: center; }

/* Text alignment follows position */
.pos-br .card-glass,
.pos-tr .card-glass { align-items: flex-end; text-align: right; }
.pos-br .work-tags,
.pos-tr .work-tags { justify-content: flex-end; }

.pos-bl .card-glass,
.pos-tl .card-glass { align-items: flex-start; text-align: left; }

.card-glass {
    display: flex;
    flex-direction: column;
    gap: 0.15rem;
}

/* ── Typography ── */
.work-eyebrow {
    font-family: 'Space Mono', monospace;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--glass-text-dark-muted);
    font-size: 0.55rem;
}
.work-stat {
    font-family: var(--font-stat);
    letter-spacing: 0.04em;
    line-height: 0.95;
    color: var(--glass-text-dark);
    text-transform: uppercase;
    font-size: 1.8rem;
}
.work-desc {
    color: var(--glass-text-dark-secondary);
    line-height: 1.4;
    font-size: 0.72rem;
}
.work-tags {
    display: flex;
    gap: 0.3rem;
    flex-wrap: wrap;
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    margin-top: 0;
    transition: max-height 0.3s ease, opacity 0.25s ease, margin-top 0.3s ease;
}
.work-card:hover .work-tags {
    max-height: 80px;
    opacity: 1;
    margin-top: 0.3rem;
}
.work-tag {
    padding: 0.15rem 0.5rem;
    background: rgba(255,255,255,0.08);
    color: var(--glass-text-dark-secondary);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 500px;
    font-size: 0.6rem;
}

/* ══════════════════════════════════════════════════
   PER-CARD HEADLINE FONTS (via data-card attribute)
   ══════════════════════════════════════════════════ */
[data-card="teardowns"] .work-stat   { font-family: 'Inter', sans-serif; font-weight: 700; text-transform: none; letter-spacing: -0.02em; }
[data-card="career"] .work-stat       { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; }
[data-card="madlab"] .work-stat       { font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 0.06em; }
[data-card="studio"] .work-stat       { font-family: 'Caveat', cursive; font-weight: 700; text-transform: none; }
[data-card="blog"] .work-stat         { font-family: 'Lora', serif; font-weight: 700; font-style: italic; text-transform: none; }
[data-card="learning"] .work-stat     { font-family: 'Josefin Sans', sans-serif; font-weight: 600; letter-spacing: 0.08em; }
[data-card="now"] .work-stat          { font-family: 'Syne', sans-serif; font-weight: 800; letter-spacing: -0.02em; text-transform: none; }
[data-card="underhood"] .work-stat    { font-family: 'Space Grotesk', sans-serif; font-weight: 600; letter-spacing: 0.02em; text-transform: none; }
[data-card="testimonials"] .work-stat { font-family: 'Corben', cursive; font-weight: 700; text-transform: none; }

/* ══════════════════════════════════════════════════
   SLOT GRID PLACEMENTS + SLOT-SPECIFIC SIZING
   ══════════════════════════════════════════════════ */

/* HERO — 4x2 */
.slot-hero { grid-column: 1 / 5; grid-row: 1 / 3; }
.slot-hero .work-eyebrow { font-size: 0.8rem; letter-spacing: 0.14em; }
.slot-hero .work-stat { font-size: 2.4rem; }
.slot-hero .work-desc { font-size: 0.85rem; max-width: 50ch; }
.slot-hero .card-glass { gap: 0.25rem; }
.slot-hero .card-overlay { max-width: 45%; }

/* TOP-RIGHT — 2x2 */
.slot-topright { grid-column: 5 / 7; grid-row: 1 / 3; }
.slot-topright .work-stat { font-size: 2rem; }
.slot-topright .work-desc { font-size: 0.78rem; }

/* WIDE-L — 3x1 */
.slot-widel { grid-column: 1 / 4; grid-row: 3 / 4; }
.slot-widel .work-stat { font-size: 1.6rem; }
.slot-widel .card-overlay { max-width: 65%; }

/* WIDE-R — 3x1 */
.slot-wider { grid-column: 4 / 7; grid-row: 3 / 4; }
.slot-wider .work-stat { font-size: 1.5rem; }
.slot-wider .card-overlay { max-width: 65%; }

/* TALL — 3x2 */
.slot-tall { grid-column: 1 / 4; grid-row: 4 / 6; }
.slot-tall .work-eyebrow { font-size: 0.75rem; }
.slot-tall .work-stat { font-size: 2.6rem; }
.slot-tall .work-desc { font-size: 0.8rem; }
.slot-tall .card-overlay { max-width: 55%; }
.slot-tall .card-glass { gap: 0.25rem; }

/* CENTER — 2x2 */
.slot-center { grid-column: 4 / 6; grid-row: 4 / 6; }
.slot-center .work-stat { font-size: 2.2rem; }
.slot-center .work-desc { font-size: 0.78rem; }

/* LEARNING — 1x2 tall */
.slot-learning { grid-column: 6 / 7; grid-row: 4 / 6; }
.slot-learning .work-eyebrow { font-size: 0.6rem; }
.slot-learning .work-stat { font-size: 1.4rem; }
.slot-learning .work-desc { font-size: 0.6rem; line-height: 1.4; }
.slot-learning .work-tag { font-size: 0.5rem; padding: 0.1rem 0.35rem; }
.slot-learning .card-overlay { padding: 0.6rem 0.7rem; max-width: 90%; }
.slot-learning .card-glass { gap: 0.1rem; }

/* BLOG — 2x1 */
.slot-blog { grid-column: 1 / 3; grid-row: 6 / 7; }
.slot-blog .work-stat { font-size: 1.8rem; }
.slot-blog .work-desc { font-size: 0.72rem; }
.slot-blog .card-overlay { max-width: 90%; }

/* NOW — 4x1 */
.slot-now { grid-column: 3 / 7; grid-row: 6 / 7; }
.slot-now .work-eyebrow { font-size: 0.65rem; }
.slot-now .work-stat { font-size: 1.8rem; }
.slot-now .work-desc { font-size: 0.7rem; line-height: 1.4; }
.slot-now .work-tag { font-size: 0.55rem; padding: 0.12rem 0.4rem; }
.slot-now .card-overlay { padding: 0.6rem 0.8rem; max-width: 60%; }
.slot-now .card-glass { gap: 0.12rem; }

/* Hover accent on teardowns in hero */
.slot-hero[data-card="teardowns"]:hover::before { border-color: rgba(212, 168, 83, 0.3); }
.slot-hero[data-card="teardowns"] .card-overlay { border-left: 2px solid rgba(212, 168, 83, 0.4); }

/* Under the hood border accent */
[data-card="underhood"] .card-overlay { border-left: 2px solid rgba(255,255,255,0.12); }

/* Testimonials quote mark */
[data-card="testimonials"] .card-glass { position: relative; overflow: visible; }
[data-card="testimonials"] .card-glass::before {
    content: '\201C';
    position: absolute;
    top: -0.6rem;
    left: 0.8rem;
    font-family: 'Lora', serif;
    font-size: 2.5rem;
    color: rgba(212, 168, 83, 0.15);
    line-height: 1;
    pointer-events: none;
}

/* /Now pulse dot */
[data-card="now"] .work-eyebrow::before {
    content: '';
    display: inline-block;
    width: 5px;
    height: 5px;
    background: #5BBA6F;
    border-radius: 50%;
    margin-right: 0.3rem;
    animation: pulse-dot 2s ease-in-out infinite;
    vertical-align: middle;
}
@keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

/* ── Shape debug labels ── */
.shape-label {
    position: absolute;
    top: 0.5rem;
    left: 0.5rem;
    z-index: 10;
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.05em;
    pointer-events: none;
}
.pos-tl .shape-label { left: auto; right: 0.5rem; }

/* ══════════════════════════════════════════════════
   PREVIEW CONTROLS
   ══════════════════════════════════════════════════ */
.controls {
    max-width: 1440px;
    margin: 1rem auto;
    display: flex;
    gap: 1rem;
    align-items: center;
    flex-wrap: wrap;
}
.controls label {
    font-size: 0.7rem;
    color: var(--glass-text-dark-muted);
    font-family: 'Space Mono', monospace;
}
.controls input[type="range"] {
    width: 180px;
    accent-color: var(--card-bg-accent);
}
.controls button {
    padding: 0.4rem 1rem;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--glass-text-dark-secondary);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    transition: all 0.2s;
}
.controls button:hover { background: rgba(255,255,255,0.12); }
.controls button.active { background: rgba(212,168,83,0.2); border-color: rgba(212,168,83,0.4); color: var(--card-bg-accent); }
.controls .val { font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--card-bg-accent); min-width: 3ch; }

</style>
</head>
<body>

<div class="preview-header">
    <h2>Monster Scene Preview — Persona Tabs</h2>
    <p>Switch personas to see card assignments per slot. Missing images shown with ratio needed.</p>
</div>

<div class="persona-tabs">
    <span class="tab-label">Persona:</span>
    <button class="persona-tab active" onclick="switchPersona('default')">Default</button>
    <button class="persona-tab" onclick="switchPersona('evaluator')">Evaluator</button>
    <button class="persona-tab" onclick="switchPersona('seeker')">Seeker</button>
    <button class="persona-tab" onclick="switchPersona('practitioner')">Practitioner</button>
    <button class="persona-tab" onclick="switchPersona('learner')">Learner</button>
    <button class="persona-tab" onclick="switchPersona('technologist')">Technologist</button>
    <button class="persona-tab" onclick="switchPersona('innercircle')">Inner Circle</button>
    <div class="image-status" id="imageStatus"></div>
</div>

<div class="controls">
    <label>Glass Blur:</label>
    <input type="range" id="blurAmt" min="0" max="30" value="12" step="1">
    <span class="val" id="blurVal">12px</span>

    <label style="margin-left: 1rem;">Glass Opacity:</label>
    <input type="range" id="glassOpacity" min="0" max="100" value="85" step="5">
    <span class="val" id="opacityVal">85%</span>

    <span style="color: rgba(255,255,255,0.15); margin: 0 0.5rem;">|</span>

    <label>Headline Color:</label>
    <button id="btnWhite" onclick="setHeadlineColor('white')">Cream</button>
    <button id="btnGold" onclick="setHeadlineColor('gold')">Gold</button>
    <button id="btnWarmWhite" class="active" onclick="setHeadlineColor('warmwhite')">Warm White</button>
</div>

<div class="work-grid" id="workGrid">
    <div class="work-card slot-hero" data-slot="hero" data-card="">
        <div class="card-bg"></div>
        <div class="shape-label">4x2 HERO &middot; 2:1</div>
        <div class="card-overlay"><div class="card-glass">

    <div class="work-card slot-topright" data-slot="topright" data-card="">

            <span class="work-eyebrow"></span>
            <span class="work-stat"></span>
            <p class="work-desc"></p>
            <div class="work-tags"></div>
        </div></div>

    <div class="work-card slot-widel" data-slot="widel" data-card="">
        <div class="card-bg"></div>
        <div class="shape-label">3x1 WIDE-L &middot; 3:1</div>
        <div class="card-overlay"><div class="card-glass">
            <span class="work-eyebrow"></span>
            <span class="work-stat"></span>
            <p class="work-desc"></p>
            <div class="work-tags"></div>
        </div></div>
    </div>

    <div class="work-card slot-wider" data-slot="wider" data-card="">
        <div class="card-bg"></div>
        <div class="shape-label">3x1 WIDE-R &middot; 3:1</div>
        <div class="card-overlay"><div class="card-glass">
            <span class="work-eyebrow"></span>
            <span class="work-stat"></span>
            <p class="work-desc"></p>
            <div class="work-tags"></div>
        </div></div>
    </div>

    <div class="work-card slot-tall" data-slot="tall" data-card="">
        <div class="card-bg"></div>
        <div class="shape-label">3x2 TALL &middot; 3:2</div>
        <div class="card-overlay"><div class="card-glass">
            <span class="work-eyebrow"></span>
            <span class="work-stat"></span>
            <p class="work-desc"></p>

        </div></div>
    </div>

    <div class="work-card slot-center" data-slot="center" data-card="">
        <div class="card-bg"></div>
        <div class="shape-label">2x2 CENTER &middot; 1:1</div>
        <div class="card-overlay"><div class="card-glass">
            <span class="work-eyebrow"></span>
            <span class="work-stat"></span>

    </div>

    <div class="work-card slot-learning" data-slot="learning" data-card="">
        <div class="card-bg"></div>
        <div class="shape-label">1x2 &middot; 1:2</div>
        <div class="card-overlay"><div class="card-glass">
            <span class="work-eyebrow"></span>
            <span class="work-stat"></span>
            <p class="work-desc"></p>
            <div class="work-tags"></div>
        </div></div>
    </div>

    <div class="work-card slot-blog" data-slot="blog" data-card="">
        <div class="card-bg"></div>
        <div class="shape-label">2x1 &middot; 2:1</div>
        <div class="card-overlay"><div class="card-glass">
            <span class="work-eyebrow"></span>
            <span class="work-stat"></span>
            <p class="work-desc"></p>

    <div class="work-card slot-now" data-slot="now" data-card="">

        <div class="shape-label">4x1 &middot; 4:1</div>
        <div class="card-overlay"><div class="card-glass">
            <span class="work-eyebrow"></span>
            <span class="work-stat"></span>
            <p class="work-desc"></p>
            <div class="work-tags"></div>
        </div></div>
    </div>
</div>

<script>
/* ══════════════════════════════════════════════════
   CARD CONTENT DATA
   ══════════════════════════════════════════════════ */
const cardData = {
    teardowns: {
        eyebrow: '6 Teardowns & Counting',
        stat: "How I'd've Built It",
        desc: 'Product teardowns of popular apps.<br>What I\'d keep, kill, and rebuild from the ground up.',
        tags: ['Instagram', 'GEICO', 'Airbnb', 'Duolingo', '+2'],
        character: 'Analyst (owl)',
        overlayPos: { hero: 'pos-tr', topright: 'pos-bl', widel: 'pos-bl', wider: 'pos-br', tall: 'pos-tr', center: 'pos-bl' }
    },
    testimonials: {
        eyebrow: 'What People Say',
        stat: 'Testimonials',
        desc: 'Words from people I\'ve built with, built for, and learned from.',
        tags: ['Colleagues', 'Founders', 'Leaders'],
        character: 'Connector (quokka)',
        overlayPos: { topright: 'pos-bc', center: 'pos-bc', wider: 'pos-br', learning: 'pos-br' }
    },
    studio: {
        eyebrow: 'Left-Brain Sandbox',
        stat: 'Studio',
        desc: 'Unrestricted play and goofery.',
        tags: ['Music', 'Photography', 'Design'],
        character: 'Artist (chinchilla)',
        overlayPos: { hero: 'pos-bl', topright: 'pos-bl', widel: 'pos-bl', wider: 'pos-bl' }
    },
    madlab: {
        eyebrow: 'Apps & Prototypes',
        stat: 'MadLab',

/* ══════════════════════════════════════════════════
   PERSONA SWITCHING
   ══════════════════════════════════════════════════ */
let currentPersona = 'default';

function switchPersona(persona) {
    currentPersona = persona;
    const config = personas[persona];

    // Update tab active state
    document.querySelectorAll('.persona-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');

    let hasCount = 0, totalCount = 0;

    // Update each slot
    Object.entries(config).forEach(([slot, cardId]) => {
        const slotEl = document.querySelector(`[data-slot="${slot}"]`);
        if (!slotEl) return;

        const card = cardData[cardId];
        const img = imageMap[cardId] && imageMap[cardId][slot];
        const bg = slotEl.querySelector('.card-bg');

        // Set card identity
        slotEl.setAttribute('data-card', cardId);

        // Set position class — remove old, add new
        slotEl.className = slotEl.className.replace(/pos-\w+/g, '');
        const posMap = card.overlayPos || {};
        const pos = posMap[slot] || 'pos-bl';
        slotEl.classList.add(pos);

        // Set background
        totalCount++;
        if (img) {
            bg.style.background = `url('${img}') center top / cover no-repeat`;
            bg.style.backgroundColor = '';
            bg.classList.remove('no-image');
            bg.removeAttribute('data-need');
            hasCount++;
        } else {
            bg.style.background = gradientFallbacks[cardId];
            bg.classList.add('no-image');
            bg.setAttribute('data-need', `need ${card.character} @ ${slotRatios[slot]}`);
        }

        // Set overlay content
        const glass = slotEl.querySelector('.card-glass');
        glass.querySelector('.work-eyebrow').textContent = card.eyebrow;
        glass.querySelector('.work-stat').innerHTML = card.stat;
        glass.querySelector('.work-desc').innerHTML = card.desc;

        const tagsEl = glass.querySelector('.work-tags');
        tagsEl.innerHTML = card.tags.map(t => `<span class="work-tag">${t}</span>`).join('');
    });

    // Update status
    document.getElementById('imageStatus').innerHTML =
        `<span class="has">${hasCount}</span> / ${totalCount} images &middot; <span class="missing">${totalCount - hasCount} missing</span>`;
}

document.getElementById('blurAmt').addEventListener('input', (e) => {
    const val = e.target.value;
    document.getElementById('blurVal').textContent = val + 'px';
    document.querySelectorAll('.card-overlay').forEach(el => {
        el.style.backdropFilter = `blur(${val}px) saturate(1.2)`;
        el.style.webkitBackdropFilter = `blur(${val}px) saturate(1.2)`;
    });
});

document.getElementById('glassOpacity').addEventListener('input', (e) => {
    const val = e.target.value;
    document.getElementById('opacityVal').textContent = val + '%';
    const alpha = (val / 100).toFixed(2);
    document.querySelectorAll('.card-overlay').forEach(el => {
        el.style.background = `rgba(16, 14, 12, ${alpha})`;
    });
});

function setHeadlineColor(variant) {
    const headlines = document.querySelectorAll('.work-stat');
    const eyebrows = document.querySelectorAll('.work-eyebrow');
    const colorBtns = [document.getElementById('btnWhite'), document.getElementById('btnGold'), document.getElementById('btnWarmWhite')];
    colorBtns.forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
    const colors = {
        'white':     { stat: '#F0E6D8', eyebrow: '#9A8E80' },
        'gold':      { stat: '#D4A853', eyebrow: '#9A8E80' },
        'warmwhite': { stat: '#F5EDE0', eyebrow: '#D4A853' }
    };
    const c = colors[variant];
    headlines.forEach(h => h.style.color = c.stat);
    eyebrows.forEach(e => e.style.color = c.eyebrow);
}
